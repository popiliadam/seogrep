# Fly.io deployment for the SeoGrep MCP gateway (@pseo/mcp).
# First deploy is a human gate — see .github/workflows/deploy-mcp.yml
# (workflow_dispatch only). Secrets (SUPABASE_*) are set via `fly secrets`.
app = "seogrep-mcp"
primary_region = "nrt"

# No [build] section here by design: flyctl resolves [build] paths relative to
# this file's directory, so a manual `fly deploy` run from apps/mcp/ would use
# the wrong context/path. Deploys always run from the repo root with an
# explicit --dockerfile flag instead (see .github/workflows/deploy-mcp.yml):
#   flyctl deploy --config apps/mcp/fly.toml --dockerfile apps/mcp/Dockerfile
# Manual deploys must be run the same way, from the repo root.

# Non-secret runtime env. DFS_BUDGET_DIR: the image is root-owned and the process runs
# non-root, so the repo-relative spend dir is unwritable in the container (T16 live-smoke
# EACCES) — point the DataForSEO budget ledger at /tmp (per-boot ephemeral, accepted).
[env]
  DFS_BUDGET_DIR = "/tmp/dfs-spend"

# MODE selects the process role at runtime (see apps/mcp/src/index.ts).
[processes]
  web = "sh -c 'MODE=web exec node apps/mcp/dist/index.js'"
  worker = "sh -c 'MODE=worker exec node apps/mcp/dist/index.js'"

# Public MCP endpoint. Always-on: auto-stop disabled, at least one machine.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ["web"]

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# The worker process is a stub (logs "not yet implemented" and exits). Keep it
# scaled to 0 until the queue consumer lands: `fly scale count worker=0`.
