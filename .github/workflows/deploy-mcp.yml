name: Deploy MCP
# First deploy is a human gate: manual trigger only, never on push/PR.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-mcp
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # pin: master@2026-07-19
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config apps/mcp/fly.toml --dockerfile apps/mcp/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
