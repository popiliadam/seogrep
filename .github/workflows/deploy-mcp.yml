name: Deploy MCP
# First deploy was a human gate (workflow_dispatch, done 2026-07-20 — success). Now also
# auto-deploys on main pushes that touch the MCP image inputs: the app itself, the
# workspace package the image builds (@pseo/core), or this workflow. Manual dispatch stays.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/mcp/**"
      - "packages/core/**"
      - ".github/workflows/deploy-mcp.yml"
      # Repo-root inputs the Docker image consumes (Dockerfile: COPY . . -> turbo prune ->
      # pnpm install --frozen-lockfile -> COPY tsconfig.base.json). A root-only change — e.g. a
      # pnpm-lock.yaml security bump — must ship a fresh image, not a silently stale one (D-I1).
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".dockerignore"

permissions:
  contents: read

concurrency:
  group: deploy-mcp
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # pin: master@2026-07-19
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config apps/mcp/fly.toml --dockerfile apps/mcp/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
